{% extends "base.html" %}
{% block content %}

<section class="news-page">
    <div class="page-header">
        <h1>Latest News</h1>
        <p>Stay updated with announcements, offers, and service news.</p>
    </div>

    <div class="news-container">
        <div class="news-content">
            <h3>{{ newsDetails.news_title }}</h3>
            <p>{{ newsDetails.news_desc|safe }}</p>
        </div>
        
        <div class="news-image-wrapper">
            <img src="/media/{{ newsDetails.news_image }}" alt="{{ newsDetails.news_title }}" class="news-image"/>
        </div>
    </div>

</section>

{% endblock %}

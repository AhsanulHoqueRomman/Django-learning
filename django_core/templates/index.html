<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>            <!Passing data from django views.py file !There's a dictionary key named title in data.>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        header {
            background: black;
            color: white;
            padding: 1rem 0;
            text-align: center;
        }
        nav {
            background: #0056b3;
            padding: 1rem;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
        }
        main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        section {
            margin: 2rem 0;
        }
        h1{
            color: white;
            margin: 1rem 0;
            
        }
        
        h2 {
            color: #007bff;
            margin: 1rem 0;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{heading}}</h1>            <!Passing data from django views.py file !There's a dictionary key named heading in data.>
    </header>
    
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
    
    <main>
        <section id="home">
            <h2>Home</h2>
            <p>This is your landing page. Welcome!</p>
        </section>
        
        <section id="about">
            <h2>About Us</h2>
            <p>Learn more about our company and mission.</p>
        </section>
        
        <section id="services">
            <h2>Services</h2>
            <p>We offer quality services to meet your needs.</p>
        </section>
        
        <section id="contact">
            <h2>Contact</h2>
            <p>Get in touch with us today.</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 Your Company. All rights reserved.</p>
    </footer>
</body>
</html>
